<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="msapplication-TileColor" content="#f40000" />
    <meta name="description" content="A simple Pokemon app" />
    <meta name="theme-color" content="#f40000" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="public/favico.ico">
    <link rel="manifest" href="public/manifest.json">
    <title>Vite App</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.css"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons"
    />

    <style>
      body {
        margin: 0;
        font-family: 'Roboto', sans-serif;
      }

      :root {
        --mdc-theme-primary: #f40000;
        --mdc-theme-secondary: #2A75BB;
        --mdc-theme-background: #f5f5f5;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <button
      id="install-btn"
      style="
        display: none;
        position: fixed;
        bottom: 70px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        padding: 12px 20px;
        background: #3b4cca;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
      "
    >
      Installeer App
    </button>
  </body>
</html>

<script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", async () => {
          try {
            await navigator.serviceWorker.register(
              "/PwaPokeApp/service-worker.js",
            );
            console.log("Service Worker registered");
          } catch (error) {
            console.error("Service Worker registration failed:", error);
          }
        });
      }

      let deferredPrompt;

      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById("install-btn").style.display = "block";
      });

      window.addEventListener("load", () => {
        document
          .getElementById("install-btn")
          .addEventListener("click", async () => {
            if (deferredPrompt) {
              deferredPrompt.prompt();
              const { outcome } = await deferredPrompt.userChoice;
              deferredPrompt = null;
              document.getElementById("install-btn").style.display = "none";
            }
          });
      });
    </script>
